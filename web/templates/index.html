<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Tycoon - Juego de Bolsa</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <header class="game-header">
            <h1>📈 Stock Market Tycoon</h1>
            <div class="game-info">
                <span id="round-display">Ronda: 0</span>
                <span id="mode-display">Modo: Estándar</span>
                <span id="current-player-display">Turno: -</span>
            </div>
        </header>

        <!-- Setup Screen -->
        <div id="setup-screen" class="screen active">
            <div class="setup-panel">
                <h2>Configurar Nueva Partida</h2>
                
                <div class="form-group">
                    <label for="player-name">Tu Nombre:</label>
                    <input type="text" id="player-name" placeholder="Ej. Warren Buffett" value="Jugador 1">
                </div>

                <div class="form-group">
                    <label for="game-mode">Modo de Juego:</label>
                    <select id="game-mode">
                        <option value="quick">Rápida (15 min) - 2-4 jugadores</option>
                        <option value="standard" selected>Estándar (30-45 min) - 3-6 jugadores</option>
                        <option value="extended">Extendida (90 min) - 4-8 jugadores</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Número de Bots:</label>
                    <div class="bot-selector">
                        <button onclick="adjustBots(-1)">-</button>
                        <span id="bot-count">2</span>
                        <button onclick="adjustBots(1)">+</button>
                    </div>
                </div>

                <button class="btn-primary" onclick="startGame()">Crear Partida</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Left Panel - Player Info -->
            <aside class="left-panel">
                <div class="player-card">
                    <h3>Tu Corporación</h3>
                    <div class="player-stats">
                        <div class="stat">
                            <label>Efectivo:</label>
                            <span id="player-cash">$10,000</span>
                        </div>
                        <div class="stat">
                            <label>Valor de Mercado:</label>
                            <span id="player-net-worth">$10,000</span>
                        </div>
                        <div class="stat">
                            <label>Influencia:</label>
                            <span id="player-influence">0</span>
                        </div>
                        <div class="stat">
                            <label>Empresas Controladas:</label>
                            <span id="player-companies">0</span>
                        </div>
                    </div>

                    <div class="player-actions">
                        <h4>Acciones</h4>
                        <button class="btn-action" onclick="nextTurn()" id="btn-next-turn">Pasar Turno</button>
                    </div>

                    <div class="hand-cards">
                        <h4>Tus Cartas</h4>
                        <div id="cards-container" class="cards-grid"></div>
                    </div>
                </div>

                <div class="leaderboard">
                    <h3>Clasificación</h3>
                    <div id="leaderboard-container"></div>
                </div>
            </aside>

            <!-- Center - Market Board -->
            <main class="market-board">
                <div class="sectors-container" id="sectors-container">
                    <!-- Los sectores se generan dinámicamente -->
                </div>

                <!-- Events Banner -->
                <div id="events-banner" class="events-banner">
                    <h3>📰 Eventos Activos</h3>
                    <div id="active-events" class="events-list"></div>
                </div>
            </main>

            <!-- Right Panel - Actions & Portfolio -->
            <aside class="right-panel">
                <div class="action-panel">
                    <h3>Operaciones</h3>
                    
                    <div class="trade-form">
                        <div class="form-group">
                            <label>Empresa:</label>
                            <select id="trade-company" onchange="updateTradeInfo()">
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Cantidad:</label>
                            <input type="number" id="trade-quantity" value="1" min="1" max="100" onchange="updateTradeInfo()">
                        </div>

                        <div class="trade-info">
                            <div>Precio actual: <span id="trade-price">$0</span></div>
                            <div>Total: <span id="trade-total">$0</span></div>
                        </div>

                        <div class="trade-buttons">
                            <button class="btn-buy" onclick="buyShares()">Comprar</button>
                            <button class="btn-sell" onclick="sellShares()">Vender</button>
                        </div>
                    </div>

                    <div class="merge-section">
                        <h4>Fusión / Adquisición</h4>
                        <select id="merge-company1">
                            <option value="">Empresa 1...</option>
                        </select>
                        <select id="merge-company2">
                            <option value="">Empresa 2...</option>
                        </select>
                        <button class="btn-merge" onclick="mergeCompanies()">Fusionar</button>
                    </div>
                </div>

                <div class="portfolio-panel">
                    <h3>Tu Cartera</h3>
                    <div id="portfolio-container" class="portfolio-list"></div>
                </div>
            </aside>
        </div>

        <!-- Modal for notifications -->
        <div id="notification-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <div id="modal-message"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/game.js"></script>
</body>
</html>
